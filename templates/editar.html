{% extends 'base.html' %}

{% block content %}

<h2>Editar Maçom</h2>

<form method="POST">

<label>Nome</label>
<input name="nome" class="form-control mb-2" value="{{ pessoa.nome }}">

<label>CIM</label>
<input name="cim" class="form-control mb-2" value="{{ pessoa.cim }}">

<label>Data Nascimento</label>
<input name="data_nascimento" class="form-control mb-2" value="{{ pessoa.data_nascimento }}">

<button class="btn btn-success">Salvar</button>
<a href="/" class="btn btn-secondary">Voltar</a>

</form>

{% endblock %}
