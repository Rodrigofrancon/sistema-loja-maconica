{% extends 'base.html' %}

{% block content %}

<h2>Cadastro de Candidato</h2>

<form method="POST" enctype="multipart/form-data">

<!-- ========================= -->
<!-- DADOS -->
<!-- ========================= -->
<div class="card mb-3">
<div class="card-body">

<h5 class="mb-3">Dados do Candidato</h5>

<div class="row">

<div class="col-md-6">
<label>Nome</label>
<input name="nome" class="form-control mb-3">
</div>

<div class="col-md-3">
<label>CPF</label>
<input name="cpf" class="form-control mb-3">
</div>

<div class="col-md-3">
<label>RG</label>
<input name="rg" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Título</label>
<input name="titulo" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Data da Candidatura</label>
<input type="date" name="data_candidatura" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Situação</label>
<select name="situacao" class="form-select mb-3">
<option value="" selected disabled>Selecione...</option>
<option value="EM_ANALISE">Processo em andamento</option>
<option value="LIVRO_NEGRO">Livro Negro</option>
<option value="LIVRO_AMARELO">Livro Amarelo</option>
<option value="CANCELADO">Processo cancelado</option>
</select>
</div>

</div>

</div>
</div>

<!-- ========================= -->
<!-- CONTATO -->
<!-- ========================= -->
<div class="card mb-3">
<div class="card-body">

<h5 class="mb-3">Contato</h5>

<div class="row">

<div class="col-md-4">
<label>Telefone</label>
<input name="telefone" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Celular</label>
<input name="celular" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Email</label>
<input name="email" class="form-control mb-3">
</div>

</div>

</div>
</div>

<!-- ========================= -->
<!-- ENDEREÇO -->
<!-- ========================= -->
<div class="card mb-3">
<div class="card-body">

<h5 class="mb-3">Endereço</h5>

<div class="row">

<div class="col-md-3">
<label>CEP</label>
<input id="cep" name="cep" class="form-control mb-3">
</div>

<div class="col-md-6">
<label>Rua</label>
<input id="rua" name="rua" class="form-control mb-3">
</div>

<div class="col-md-3">
<label>Número</label>
<input name="numero" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Bairro</label>
<input id="bairro" name="bairro" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Cidade</label>
<input id="cidade" name="cidade" class="form-control mb-3">
</div>

<div class="col-md-2">
<label>Estado</label>
<input id="estado" name="estado" class="form-control mb-3">
</div>

<div class="col-md-2">
<label>País</label>
<input name="pais" class="form-control mb-3" value="Brasil">
</div>

</div>

</div>
</div>

<!-- ========================= -->
<!-- 📁 PASTA DE ARQUIVOS -->
<!-- ========================= -->
<div class="card mb-3">
<div class="card-body">

<h5 class="mb-3">Pasta de Arquivos</h5>

<div id="arquivos-container">

<div class="row mb-2">

<div class="col-md-5">
<label>Nome do Documento</label>
<input name="doc_nome[]" class="form-control">
</div>

<div class="col-md-3">
<label>Data do Documento</label>
<input type="date" name="doc_data[]" class="form-control">
</div>

<div class="col-md-4">
<label>Arquivo</label>
<input type="file" name="arquivo[]" class="form-control">
</div>

</div>

</div>

<button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addArquivo()">
+ Adicionar Arquivo
</button>

</div>
</div>

<!-- ========================= -->
<!-- BOTÕES -->
<!-- ========================= -->
<div class="d-flex gap-2">
    <button class="btn btn-success">Salvar</button>
    <a href="/candidatos" class="btn btn-secondary">Voltar</a>
</div>

</form>

<!-- ========================= -->
<!-- SCRIPT MULTI-UPLOAD -->
<!-- ========================= -->
<script>
function addArquivo() {
    const container = document.getElementById('arquivos-container');

    const html = `
    <div class="row mb-2">

        <div class="col-md-5">
            <input name="doc_nome[]" class="form-control" placeholder="Nome do documento">
        </div>

        <div class="col-md-3">
            <input type="date" name="doc_data[]" class="form-control">
        </div>

        <div class="col-md-4">
            <input type="file" name="arquivo[]" class="form-control">
        </div>

    </div>
    `;

    container.insertAdjacentHTML('beforeend', html);
}
</script>

{% endblock %}
