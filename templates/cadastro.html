{% extends 'base.html' %}

{% block content %}

<h2 class="mb-3">Cadastro de Maçom</h2>

<form method="POST" enctype="multipart/form-data">

<!-- ========================= -->
<!-- TABS -->
<!-- ========================= -->
<ul class="nav nav-tabs">

<li class="nav-item">
<button type="button" class="nav-link active" data-bs-toggle="tab" data-bs-target="#dados">Dados</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#contato">Contato</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#endereco">Endereço</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#documentos_dados">
Documentos
</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#arquivos">
Pasta de Arquivos
</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#maconico">Maçônico</button>
</li>

<li class="nav-item">
<button type="button" class="nav-link" data-bs-toggle="tab" data-bs-target="#familiares">Familiares</button>
</li>

</ul>

<div class="tab-content mt-3">

<!-- ========================= -->
<!-- DADOS -->
<!-- ========================= -->
<div class="tab-pane fade show active" id="dados">
<div class="row">

<div class="col-md-6">
<label>Nome</label>
<input name="nome" class="form-control mb-3">
</div>

<div class="col-md-3">
<label>CIM</label>
<input name="cim" class="form-control mb-3">
</div>

<div class="col-md-3">
<label>Data Nascimento</label>
<input type="date" name="data_nascimento" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Naturalidade</label>
<input name="naturalidade" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Nacionalidade</label>
<input name="nacionalidade" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Estado Civil</label>
<input name="estado_civil" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Sexo</label>
<input name="sexo" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Pai</label>
<input name="nome_pai" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Mãe</label>
<input name="nome_mae" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Escolaridade</label>
<input name="escolaridade" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Cônjuge</label>
<input name="conjuge" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Data Casamento</label>
<input type="date" name="data_casamento" class="form-control mb-3">
</div>

</div>
</div>

<!-- ========================= -->
<!-- DOCUMENTOS -->
<!-- ========================= -->
<div class="tab-pane fade" id="documentos_dados">
<div class="card mt-3">
<div class="card-body">

<h5>Documentos</h5>

<div class="row">
<div class="col-md-4">
<label>CPF</label>
<input name="cpf" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>RG</label>
<input name="rg" class="form-control mb-3">
</div>

<div class="col-md-4">
<label>Título</label>
<input name="titulo" class="form-control mb-3">
</div>
</div>

</div>
</div>
</div>

<!-- ========================= -->
<!-- 📁 ARQUIVOS -->
<!-- ========================= -->
<div class="tab-pane fade" id="arquivos">
<div class="card mt-3">
<div class="card-body">

<h5>Pasta de Arquivos</h5>

<div id="arquivos-container">

<div class="row mb-2">
<div class="col-md-5">
<input name="doc_nome[]" class="form-control" placeholder="Nome do documento">
</div>
<div class="col-md-3">
<input type="date" name="doc_data[]" class="form-control">
</div>
<div class="col-md-4">
<input type="file" name="arquivo[]" class="form-control">
</div>
</div>

</div>

<button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addArquivo()">
+ Adicionar Arquivo
</button>

</div>
</div>
</div>

</div> <!-- FECHA TAB-CONTENT -->

<button class="btn btn-success mt-3">Salvar</button>

</form>

<script>
function addArquivo() {
    const container = document.getElementById('arquivos-container');

    const html = `
    <div class="row mb-2">
        <div class="col-md-5">
            <input name="doc_nome[]" class="form-control" placeholder="Nome do documento">
        </div>
        <div class="col-md-3">
            <input type="date" name="doc_data[]" class="form-control">
        </div>
        <div class="col-md-4">
            <input type="file" name="arquivo[]" class="form-control">
        </div>
    </div>
    `;

    container.insertAdjacentHTML('beforeend', html);
}
</script>

{% endblock %}
